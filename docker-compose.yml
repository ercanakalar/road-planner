version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    network_mode: "host"
    depends_on:
      - test-db

  test-db:
    image: postgres:latest
    container_name: road-map-db
    ports:
      - "5434:5432"
    # volumes:
    #   - road-map-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: road
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: road-map

# volumes:
#   road-map-db:

